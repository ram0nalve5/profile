<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Deletar Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Requisições de HTTP</a>
      <div class="navbar-nav">
        <a class="nav-link" href="create-user.html">Criar</a>
        <a class="nav-link" href="read-user.html">Ler</a>
        <a class="nav-link" href="update-user.html">Alterar</a>
        <a class="nav-link active" href="delete-user.html">Deletar</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="card shadow-sm mt-4">
      <div class="card-body">
        <h4 class="card-title mb-4">Deletar Usuário</h4>

        <div class="mb-3">
          <label class="form-label">CPF</label>
          <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00"/>
        </div>

        <button class="btn btn-danger" onclick="deletar_user()">Deletar usuário</button>

        <div id="msg" class="mt-3"></div>
      </div>
    </div>
  </div>


<script>
  async function deletar_user(){
    let cpf = document.getElementById("cpf").value.trim();
    let mensagem = document.getElementById("msg");
    if (!cpf){
        mensagem.innerHTML = `
          <div class="alert alert-warning">Preencha todos os campos</div>
        `
      }
    let resposta = await fetch(`http://127.0.0.1:5000/api/users/${cpf}`,{
      method: "DELETE",
      headers: {"Content-Type": "application/json"}
    })
    let dados = await resposta.json()
    if (resposta.ok) {
      mensagem.innerHTML = `
          <div class="alert alert-success alert-dismissible fade show" role="alert">
            ${dados.message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        `
    }
        else{

          mensagem.innerHTML = `
          <div class="alert alert-danger alert-dismissible fade show" role="alert">
            Erro no cadastro! ${dados.error}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
          `

        }                       
    }

</script>

</body>
</html>
