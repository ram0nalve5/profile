<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Ler Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Requisições de HTTP</a>
      <div class="navbar-nav">
        <a class="nav-link" href="create-user.html">Criar</a>
        <a class="nav-link active" href="read-user.html">Ler</a>
        <a class="nav-link" href="update-user.html">Alterar</a>
        <a class="nav-link" href="delete-user.html">Deletar</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- Busca por CPF -->
    <div class="card shadow-sm mt-4">
      <div class="card-body">
        <h4 class="card-title mb-4">Buscar por CPF</h4>

        <div class="mb-3">
          <label class="form-label">CPF</label>
          <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00"/>
        </div>

        <button class="btn btn-primary" onclick="get_user()">Buscar</button>

        <div id="resultado" class="mt-3"></div>
      </div>
    </div>

    <!-- Todos os usuários -->
    <div class="card shadow-sm mt-4">
      <div class="card-body">
        <h4 class="card-title mb-4">Todos os Usuários</h4>

        <button class="btn btn-outline-secondary mb-3" onclick="get_users()">Carregar todos</button>

        <table class="table table-bordered table-hover" id="tabela" style="display:none">
          <thead class="table-dark">
            <tr>
              <th>Nome</th>
              <th>CPF</th>
            </tr>
          </thead>
          <tbody id="corpo-tabela"></tbody>
        </table>

        <div id="mensagem"></div>
      </div>
    </div>

  </div>

  <script>
    async function get_user() {
      let cpf = document.getElementById("cpf").value.trim()
      let resultado = document.getElementById("resultado")

      if (!cpf){
        resultado.innerHTML = `
          <div class="alert alert-warning">Preencha todos os campos</div>
        `
      }

      let resposta = await fetch(`http://127.0.0.1:5000/api/users/${cpf}`)
      let dados = await resposta.json()
      if (resposta.ok){
        resultado.innerHTML = `
          <div class="alert alert-success">
           	<strong>${dados.nome}</strong> &mdash; ${dados.cpf}
          </div>
           `
      } else {
        resultado.innerHTML = `
            <div class="alert alert-danger">Falha na busca: ${dados.error}</div>
          `
      }
    }
    // Função que dados dos usuários
    async function get_users() {
      let corpo_tabela = document.getElementById("corpo-tabela")
      let tabela = document.getElementById("tabela")
      let mensagem = document.getElementById("mensagem") 
      let resposta = await fetch(`http://127.0.0.1:5000/api/users`)
      let dados = await resposta.json()
      
      if(dados.length === 0) {
        tabela.style.display = "none"
        resultado.innerHTML = `
          <div class="alert alert-warning">Nenhum usuário encontrado!</div>
        `
        return
      }
        corpo_tabela.innerHTML = dados.map(user => `
        <tr>
          <td>${user.nome}</td>
          <td>${user.marca}</td>
          <td>${user.preco}</td>
          <td>${user.quantidade}</td>  
        </tr>
        `).join("")
   
      tabela.style.display = "table"
      mensagem.innerHTML = "";
      
    }
  </script>
</body>
</html>
