<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Criar Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <!-- Menu de Navegação  -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Requisições de HTTP</a>
      <div class="navbar-nav">
        <a class="nav-link active" href="create-user.html">Criar</a>
        <a class="nav-link" href="read-user.html">Ler</a>
        <a class="nav-link" href="update-user.html">Alterar</a>
        <a class="nav-link" href="delete-user.html">Deletar</a>
      </div>
    </div>
  </nav>

  <!-- Form de Cadastro -->
  <div class="container">
    <div class="card shadow-sm mt-4">
      <div class="card-body">
        <h4 class="card-title mb-4">Criar Usuário</h4>

        <div class="mb-3">
          <label class="form-label">CPF</label>
          <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00"/>
        </div>

        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input type="text" class="form-control" id="nome" placeholder="Nome completo"/>
        </div>

        <button class="btn btn-primary" onclick="create_user()">Cadastrar</button>

        <div id="mensagem" class="mt-3"></div>
      </div>
    </div>
  </div>


  <script>
    async function create_user() {
      let cpf = document.getElementById("cpf").value.trim()
      let nome = document.getElementById("nome").value.trim()
      let mensagem = document.getElementById("mensagem")

      // Realiza a requisição enviando os dados para o back-end
      let resposta = await fetch("http://127.0.0.1:5000/api/users", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({cpf, nome : nome})
      })
      let dados = await resposta.json()
      if (resposta.ok) {
        mensagem.innerHTML = `
          <div class="alert alert-success alert-dismissible fade show" role="alert">
            Usuário ${nome} cadastrado com sucesso!
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        `
      }
      else{
        mensagem.innerHTML = `
          <div class="alert alert-danger alert-dismissible fade show" role="alert">
            Erro no cadastro! ${dados.error}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        `
      }
    }
  </script>
</body>
</html>
