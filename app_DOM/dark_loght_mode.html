<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Claro/Escuro</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: white;
            color: #222;
            transition: background 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 80px;
        }
        .dark {
            background-color: black;
            color: rgb(255, 255, 255)
        }
        #tema {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
        }

        #alterar_tema {
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Modo Escuro</h1>
    <button id="alterar_tema"> Alterar Tema </button>

    <script>
        var alterar_tema = document.getElementById("alterar_tema")
        alterar_tema.addEventListener("click", alterar)
        function alterar() {
            document.body.classList.toggle("dark")
        }
    </script>
</body>
</html>
