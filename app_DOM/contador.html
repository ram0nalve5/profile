<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(0, 0, 0);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 80px;
        }

        #contador {
            font-size: 3em;
            width: 120px;
            text-align: center;
            padding: 10px;
            border: 2px solid rgb(0, 0, 0);
            border-radius: 8px;
            background-color: blueviolet;
        }

        button {
            padding: 10px 20px;
            font-size: 1.2em;
            margin: 0.5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="contador"> 0 </div>
        <div>
            <button id="mais">+</button>
            <button id="menos">-</button>
        </div>
    </div>
    <script>
        var contador = 0
        var contagem = document.getElementById("contador")
        var mais = document.getElementById("mais")
        var menos = document.getElementById("menos")

        mais.addEventListener("click", aumentar)
        function aumentar() {
            if (contador < 67){
                contador ++
                contagem.innerHTML = contador
            }
        }

         menos.addEventListener("click", diminuir)
        function diminuir() {
            if (contador > 0){
                contador --
                contagem.innerHTML = contador
            }
        }
    </script>
</body>
</html>
