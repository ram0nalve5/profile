<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validação de E-mail</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
        width: 300px;
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #4facfe;
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #00c6ff;
    }

    #msg {
        margin-top: 15px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Validação de E-mail</h2>
    <input id="email" placeholder="Digite seu e-mail">
    <button id="validar">Validar</button>
    <p id="msg"></p>
</div>

<script>
document.getElementById("validar").addEventListener("click", () => {
    const email = document.getElementById("email").value.trim();
    const msg = document.getElementById("msg");

    let validar = false;

    for (let letra of email) {
        if (letra === "@") {
            validar = true;
            break;
        }
    }

    msg.innerText = validar ? "E-mail válido! Redirecionando..." : "E-mail inválido.";
    msg.style.color = validar ? "green" : "red";

    if (validar) {
        setTimeout(() => {
            window.location.href = "mini-app.html";
        }, 1500);
    }
});
</script>

</body>
</html>
