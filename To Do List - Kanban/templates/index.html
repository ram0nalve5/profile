<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Taskan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/styles.css"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-sm card-login">
    <div class="card-body p-4">

      <div class="text-center mb-4">
        <img src="../static/images/Logotipo - Taskan.png" alt="Logotipo - Taskan" class="logo-login"/>
      </div>

      <div class="mb-3">
        <label class="form-label">CPF</label>
        <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input type="password" class="form-control" id="senha" placeholder="Informe sua senha..."/>
      </div>

      <button class="btn btn-primary w-100 mb-2" onclick="fazer_login()">Entrar</button>

      <div id="mensagem" class="mt-3"></div>

    </div>
  </div>

  <!-- Vinculo com os arquivos de JS -->
  <script src="../static/js/utilidades.js"></script>
  <script src="../static/js/index.js"></script>

</body>
</html>
