<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Usuários - Taskan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/styles.css"/>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column p-3">
    <div class="sidebar-logo mb-4">
      <img src="../static/images/Logotipo do Sidebar - Taskan.png" alt="Taskan" class="logo-sidebar"/>
      <span class="text-white fw-bold">Taskan</span>
    </div>
    <nav class="nav flex-column gap-1">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="usuarios.html" class="nav-link active">Usuários</a>
      <a href="status_tarefa.html" class="nav-link">Status de Tarefas</a>
      <a href="tarefas.html" class="nav-link">Tarefas</a>
    </nav>
    <div class="mt-auto">
      <button class="btn btn-outline-light w-100" onclick="fazer_logout()">Sair</button>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div class="conteudo">

    <h4 class="mb-4">Usuários</h4>

    <!-- Formulário de cadastro/edição de dados -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">

        <h6 class="mb-3" id="titulo-formulario">Novo Usuário</h6>

        <input type="hidden" id="id-usuario"/>

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" placeholder="Nome completo"/>
          </div>
          <div class="col-md-6">
            <label class="form-label">CPF</label>
            <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00"/>
          </div>
          <div class="col-md-6">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="email@exemplo.com"/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Telefone</label>
            <input type="text" class="form-control" id="telefone" placeholder="(00) 00000-0000"/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Data de Nascimento</label>
            <input type="date" class="form-control" id="data-nascimento"/>
          </div>
          <div class="col-md-6">
            <label class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" placeholder="Senha"/>
          </div>
          <div class="col-md-12">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="administrador"/>
              <label class="form-check-label">Administrador</label>
            </div>
          </div>
        </div>

        <div class="mt-3 mb-2 d-flex gap-2">
          <button class="btn btn-primary" onclick="salvar_usuario()">Salvar</button>
          <button class="btn btn-secondary" onclick="cancelar()">Cancelar</button>
        </div>

        <div id="mensagem" class="mt-3"></div>

      </div>
    </div>
    <!-- Tabela de usuários -->
    <div class="card shadow-sm">
      <div class="card-body">
        <table class="table taable-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Nome</th>
              <th>CPF</th>
              <th>E-mail</th>
              <th>Telefone</th>
              <th>Administrador</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-usuarios">

            <!-- Linhas geradas dinamicamente pelo JS -->

          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Vinculo com os arquivos de JS -->
  <script src="../static/js/utilidades.js"></script>
  <script src="../static/js/usuarios.js"></script>

</body>
</html>
