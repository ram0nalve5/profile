<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Status de Tarefas - Taskan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/styles.css"/>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column p-3">
    <div class="sidebar-logo mb-4">
      <img src="../static/images/Logotipo do Sidebar - Taskan.png" alt="Logotipo - Taskan" class="logo-sidebar"/>
    </div>
    <nav class="nav flex-column gap-1">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="usuarios.html" class="nav-link">Usuários</a>
      <a href="status_tarefa.html" class="nav-link active">Status de Tarefas</a>
      <a href="tarefas.html" class="nav-link">Tarefas</a>
    </nav>
    <div class="mt-auto">
      <button class="btn btn-outline-light w-100" onclick="fazer_logout()">Sair</button>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div class="conteudo">

    <h4 class="mb-4">Status de Tarefas</h4>

    <!-- Formulário de cadastro/edição de dados -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">

        <h6 class="mb-3" id="titulo-formulario"><b>Registrar Novo Status</b></h6>

        <input type="hidden" id="id-status-tarefa"/>

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" placeholder="Digite o nome do novo Status de Tarefas"/>
          </div>
        </div>

        <div class="mt-3 d-flex gap-2">
          <button class="btn btn-primary" onclick="salvar_status_tarefa()">Salvar</button>
          <button class="btn btn-secondary" onclick="cancelar()">Cancelar</button>
        </div>

        <div id="mensagem" class="mt-3"></div>

      </div>
    </div>

    <!-- Tabela de status das tarefas -->
    <div class="card shadow-sm">
      <div class="card-body">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-status-tarefa">

            <!-- Linhas geradas dinamicamente pelo JS -->

          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Vinculo com os arquivos de JS -->
  <script src="../static/js/utilidades.js"></script>
  <script src="../static/js/status_tarefa.js"></script>

</body>
</html>
