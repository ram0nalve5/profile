<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel de Gerenciamento - Taskan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../static/css/styles.css"/>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar d-flex flex-column p-3">
    <div class="sidebar-logo mb-4">
      <img src="../static/images/Logotipo do Sidebar - Taskan.png" alt="Logotipo - Taskan" class="logo-sidebar"/>
    </div>
    <nav class="nav flex-column gap-1">
      <a href="dashboard.html" class="nav-link active">Dashboard</a>
      <a href="usuarios.html" class="nav-link">Usuários</a>
      <a href="status_tarefa.html" class="nav-link">Status de Tarefas</a>
      <a href="tarefas.html" class="nav-link">Tarefas</a>
    </nav>
    <div class="mt-auto">
      <button class="btn btn-outline-light w-100" onclick="fazer_logout()">Sair</button>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div class="conteudo">

    <h4 class="mb-4">Painel de Gerenciamento</h4>

    <!-- Cartões de resumo -->
    <div class="row g-3 mb-5">
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <p class="text-muted mb-1">Total de Tarefas</p>
            <h3 id="total-tarefas">—</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <p class="text-muted mb-1">Em Andamento</p>
            <h3 id="total-andamento">—</h3>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <p class="text-muted mb-1">Concluídas</p>
            <h3 id="total-concluidas">—</h3>
          </div>
        </div>
      </div>
    </div>

    <!-- Quadro do Kanban -->
    <h5 class="mb-3">Quadro Kanban</h5>
    <div class="quadro-kanban" id="quadro-kanban">



    </div>

  </div>

  <!-- Vinculo com os arquivos de JS -->
  <script src="../static/js/utilidades.js"></script>
  <script src="../static/js/dashboard.js"></script>

</body>
</html>
